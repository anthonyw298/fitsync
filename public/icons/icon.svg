<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0A0A0F"/>
  <rect x="16" y="16" width="480" height="480" rx="80" fill="#13131A"/>
  <!-- Dumbbell/fitness icon -->
  <g transform="translate(256,256)">
    <!-- Left weight -->
    <rect x="-140" y="-60" width="40" height="120" rx="8" fill="#8B5CF6"/>
    <rect x="-160" y="-40" width="20" height="80" rx="4" fill="#8B5CF6" opacity="0.7"/>
    <!-- Right weight -->
    <rect x="100" y="-60" width="40" height="120" rx="8" fill="#8B5CF6"/>
    <rect x="140" y="-40" width="20" height="80" rx="4" fill="#8B5CF6" opacity="0.7"/>
    <!-- Bar -->
    <rect x="-100" y="-10" width="200" height="20" rx="10" fill="#6D28D9"/>
    <!-- Pulse line -->
    <polyline points="-80,80 -40,80 -20,40 0,120 20,60 40,80 80,80" fill="none" stroke="#10B981" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- FitSync text -->
  <text x="256" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#F1F1F3" text-anchor="middle">FitSync</text>
</svg>
